<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak – From Mohamed Irzath</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --gold-bright: #FFE48A;
    --gold-dark: #8B6914;
    --bg-deep: #0A0600;
    --bg-mid: #120C00;
    --cream: #FFF8E7;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: 'Cormorant Garamond', serif;
    color: var(--cream);
  }

  /* ── Starfield ── */
  canvas#stars {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── Radial glow ── */
  .glow-bg {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 70% 60% at 50% 55%, rgba(201,168,76,0.13) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 30%, rgba(201,168,76,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── Ornamental border ── */
  .border-frame {
    position: fixed; inset: 14px; z-index: 2;
    border: 1px solid rgba(201,168,76,0.35);
    pointer-events: none;
  }
  .border-frame::before {
    content:'';
    position: absolute; inset: 6px;
    border: 1px solid rgba(201,168,76,0.15);
  }

  /* Corner ornaments */
  .corner {
    position: fixed; z-index: 3;
    width: 60px; height: 60px;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 8px; left: 8px; }
  .corner.tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .corner.bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .corner.br { bottom: 8px; right: 8px; transform: scale(-1); }

  /* ── Main container ── */
  .scene {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  /* ── Moon ── */
  .moon-wrap {
    position: relative;
    width: 120px; height: 120px;
    margin-bottom: 6px;
    animation: moonFloat 6s ease-in-out infinite;
  }
  @keyframes moonFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .moon {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-bright), var(--gold) 50%, var(--gold-dark) 100%);
    box-shadow:
      0 0 30px rgba(201,168,76,0.6),
      0 0 80px rgba(201,168,76,0.25),
      0 0 160px rgba(201,168,76,0.1);
    animation: moonPulse 4s ease-in-out infinite;
  }
  @keyframes moonPulse {
    0%,100% { box-shadow: 0 0 30px rgba(201,168,76,0.6), 0 0 80px rgba(201,168,76,0.25); }
    50%      { box-shadow: 0 0 50px rgba(201,168,76,0.9), 0 0 120px rgba(201,168,76,0.4); }
  }
  /* crescent mask */
  .moon::after {
    content: '';
    position: absolute;
    top: -8%; left: 18%;
    width: 88%; height: 88%;
    border-radius: 50%;
    background: var(--bg-deep);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  }

  /* ── Star above ── */
  .star-icon {
    position: absolute;
    top: 2px; right: -10px;
    font-size: 22px;
    color: var(--gold-bright);
    text-shadow: 0 0 12px var(--gold);
    animation: starSpin 8s linear infinite;
  }
  @keyframes starSpin {
    0%   { transform: rotate(0deg) scale(1); }
    50%  { transform: rotate(180deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* ── Arabic text ── */
  .arabic {
    font-size: clamp(22px, 5vw, 38px);
    color: var(--gold-light);
    letter-spacing: 0.06em;
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
    margin-bottom: 4px;
    opacity: 0;
    animation: fadeUp 1.2s 0.3s ease forwards;
  }

  /* ── Main title ── */
  .title-wrap {
    text-align: center;
    margin: 4px 0 8px;
    opacity: 0;
    animation: fadeUp 1.2s 0.6s ease forwards;
  }
  .eid {
    display: block;
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(42px, 11vw, 96px);
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold-bright) 40%, var(--gold) 60%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 16px rgba(201,168,76,0.5));
    letter-spacing: 0.06em;
  }
  .mubarak {
    display: block;
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(20px, 5vw, 44px);
    font-weight: 400;
    letter-spacing: 0.28em;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 4px;
  }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 14px;
    width: min(420px, 80vw);
    margin: 10px 0;
    opacity: 0;
    animation: fadeUp 1.2s 0.9s ease forwards;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 8px var(--gold);
  }

  /* ── Message ── */
  .message {
    font-size: clamp(14px, 2.5vw, 19px);
    font-style: italic;
    font-weight: 300;
    color: rgba(255,248,231,0.82);
    text-align: center;
    max-width: min(480px, 82vw);
    line-height: 1.75;
    letter-spacing: 0.02em;
    opacity: 0;
    animation: fadeUp 1.2s 1.1s ease forwards;
  }

  /* ── From line ── */
  .from-wrap {
    margin-top: 16px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.2s 1.4s ease forwards;
  }
  .from-label {
    display: block;
    font-size: clamp(11px, 1.8vw, 13px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin-bottom: 4px;
  }
  .from-name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(15px, 3vw, 24px);
    font-weight: 400;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-bright), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.1em;
  }

  /* ── Floating lanterns ── */
  .lantern {
    position: fixed; z-index: 5;
    font-size: 28px;
    opacity: 0;
    animation: lanternRise var(--dur) var(--delay) ease-in-out infinite;
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.7));
  }
  @keyframes lanternRise {
    0%   { opacity: 0; transform: translateY(0) rotate(-5deg); }
    15%  { opacity: 0.7; }
    85%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-100vh) rotate(8deg); }
  }

  /* ── Particle sparkles ── */
  .sparkle {
    position: fixed; z-index: 4;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--gold-bright);
    box-shadow: 0 0 6px var(--gold);
    opacity: 0;
    animation: sparkleFade var(--sdur) var(--sdelay) ease-in-out infinite;
  }
  @keyframes sparkleFade {
    0%,100% { opacity: 0; transform: scale(0); }
    50%      { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive tweaks ── */
  @media (max-height: 600px) {
    .moon-wrap { width: 70px; height: 70px; margin-bottom: 2px; }
    .scene { gap: 0; }
    .message { display: none; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="glow-bg"></div>
<div class="border-frame"></div>

<!-- Corner ornaments -->
<div class="corner tl"><svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 2 L2 28 M2 2 L28 2" stroke="#C9A84C" stroke-width="1.5" opacity="0.8"/>
  <path d="M2 2 L18 18" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
  <circle cx="2" cy="2" r="3" fill="#C9A84C" opacity="0.9"/>
  <circle cx="18" cy="18" r="1.5" fill="#C9A84C" opacity="0.5"/>
  <path d="M8 2 L8 8 L2 8" stroke="#C9A84C" stroke-width="0.6" opacity="0.4" fill="none"/>
</svg></div>
<div class="corner tr"><svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 2 L2 28 M2 2 L28 2" stroke="#C9A84C" stroke-width="1.5" opacity="0.8"/>
  <path d="M2 2 L18 18" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
  <circle cx="2" cy="2" r="3" fill="#C9A84C" opacity="0.9"/>
  <circle cx="18" cy="18" r="1.5" fill="#C9A84C" opacity="0.5"/>
</svg></div>
<div class="corner bl"><svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 2 L2 28 M2 2 L28 2" stroke="#C9A84C" stroke-width="1.5" opacity="0.8"/>
  <circle cx="2" cy="2" r="3" fill="#C9A84C" opacity="0.9"/>
</svg></div>
<div class="corner br"><svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 2 L2 28 M2 2 L28 2" stroke="#C9A84C" stroke-width="1.5" opacity="0.8"/>
  <circle cx="2" cy="2" r="3" fill="#C9A84C" opacity="0.9"/>
</svg></div>

<!-- Main scene -->
<div class="scene">

  <div class="arabic">عيد مبارك</div>

  <div class="moon-wrap">
    <div class="moon"></div>
    <div class="star-icon">✦</div>
  </div>

  <div class="title-wrap">
    <span class="eid">EID</span>
    <span class="mubarak">M U B A R A K</span>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <p class="message">
    May this blessed day bring you<br>
    joy, peace, and prosperity.<br>
    Wishing you and your loved ones<br>
    a wonderful celebration.
  </p>

  <div class="from-wrap">
    <span class="from-label">with warm wishes from</span>
    <span class="from-name">Mohamed Irzath</span>
  </div>

</div>

<script>
// ── Starfield canvas ──
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H, stars = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initStars(); });

function initStars() {
  stars = Array.from({ length: 200 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.4 + 0.3,
    a: Math.random(),
    s: Math.random() * 0.008 + 0.003,
    d: Math.random() > 0.5 ? 1 : -1
  }));
}
initStars();

function drawStars() {
  ctx.clearRect(0, 0, W, H);
  stars.forEach(s => {
    s.a += s.s * s.d;
    if (s.a <= 0 || s.a >= 1) s.d *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(240,210,100,${s.a * 0.85})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ── Floating lanterns ──
const lanternEmojis = ['🌙','✨','⭐','🌟'];
for (let i = 0; i < 6; i++) {
  const el = document.createElement('div');
  el.className = 'lantern';
  el.textContent = lanternEmojis[i % lanternEmojis.length];
  el.style.setProperty('--dur', (8 + Math.random() * 8) + 's');
  el.style.setProperty('--delay', (Math.random() * 10) + 's');
  el.style.left = (5 + Math.random() * 90) + 'vw';
  el.style.bottom = '-60px';
  document.body.appendChild(el);
}

// ── Sparkles ──
for (let i = 0; i < 30; i++) {
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  sp.style.setProperty('--sdur', (1.5 + Math.random() * 3) + 's');
  sp.style.setProperty('--sdelay', (Math.random() * 5) + 's');
  sp.style.left  = Math.random() * 100 + 'vw';
  sp.style.top   = Math.random() * 100 + 'vh';
  document.body.appendChild(sp);
}
</script>
</body>
</html>
